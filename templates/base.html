<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Data Analysis Training" }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto Condensed', Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #1f2937;
        }

        /* NAVBAR */
        .top-bar {
            position: sticky;
            top: 0;
            background: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            gap: 30px;
            padding-left: 20px;
        }

        .nav-container a {
            text-decoration: none;
            font-weight: bold;
            color: #1f2937;
        }

        .nav-container a:hover {
            color: #2563eb;
        }

        section {
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1f2937;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-bar">
    <div class="nav-container">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('excel') }}">Excel</a>
    </div>
</div>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<footer>
    <p>© 2026 Data Analysis Training</p>
</footer>

</body>
</html>
